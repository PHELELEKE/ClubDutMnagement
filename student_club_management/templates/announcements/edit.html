{% extends 'base.html' %}
{% block title %}Edit Announcement - DUT Club Management{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-lg-10 mx-auto">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <div class="d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">✏️ Edit Announcement</h4>
                        <a href="/announcements/{{ announcement.id }}" class="btn btn-outline-light btn-sm">← Back</a>
                    </div>
                </div>
                
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {{ csrf_token() }}

                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" name="title" id="title" class="form-control" required value="{{ announcement.title }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="content" class="form-label">Content</label>
                        <textarea name="content" id="content" class="form-control" rows="6" required>{{ announcement.content }}</textarea>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="priority" class="form-label">Priority</label>
                            <select name="priority" id="priority" class="form-select">
                                <option value="normal" {% if announcement.priority == 'normal' %}selected{% endif %}>Normal</option>
                                <option value="important" {% if announcement.priority == 'important' %}selected{% endif %}>Important</option>
                                <option value="urgent" {% if announcement.priority == 'urgent' %}selected{% endif %}>Urgent</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check mt-4">
                                <input type="checkbox" name="pinned" class="form-check-input" id="pinned" {% if announcement.pinned %}checked{% endif %}>
                                <label class="form-check-label" for="pinned">Pin this announcement</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="resource_links" class="form-label">Resource Links (one per line)</label>
                        <textarea name="resource_links" id="resource_links" class="form-control" rows="3">{% for link in resource_links %}{{ link }}
{% endfor %}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="attachment" class="form-label">Replace Attachment</label>
                        <input type="file" name="attachment" id="attachment" class="form-control">
                        {% if announcement.attachment_url %}
                        <small class="form-text text-muted">Current: {{ announcement.attachment_name }}</small>
                        {% endif %}
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Update Announcement</button>
                        <a href="/announcements/{{ announcement.id }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
