{% extends 'base.html' %}
{% block title %}Edit Event - DUT Club Management{% endblock %}
{% block content %}
<div class="row">
  <div class="col-md-8 offset-md-2">
    <div class="glass-card">
      <h2>Edit Event</h2>
      <p class="lead">Update event details</p>
      
      <form method="POST" class="mt-4">
        <div class="form-group mb-3">
          <label for="event_name" class="form-label">Event Name *</label>
          <input type="text" class="form-control" id="event_name" name="event_name" value="{{ event.event_name }}" required>
        </div>
        
        <div class="form-group mb-3">
          <label for="description" class="form-label">Description *</label>
          <textarea class="form-control" id="description" name="description" rows="4" required>{{ event.description }}</textarea>
        </div>
        
        <div class="form-group mb-3">
          <label for="event_date" class="form-label">Date & Time *</label>
          <input type="datetime-local" class="form-control" id="event_date" name="event_date" value="{{ event.event_date.strftime('%Y-%m-%dT%H:%M') if event.event_date else '' }}" required>
        </div>
        
        <div class="form-group mb-3">
          <label for="location" class="form-label">Location *</label>
          <input type="text" class="form-control" id="location" name="location" value="{{ event.location }}" required>
        </div>
        
        <div class="form-group mb-3">
          <label for="max_attendees" class="form-label">Max Attendees</label>
          <input type="number" class="form-control" id="max_attendees" name="max_attendees" min="1" value="{{ event.max_attendees if event.max_attendees else '' }}" placeholder="Leave empty for unlimited">
        </div>
        
        <div class="mt-4">
          <button type="submit" class="btn btn-success btn-lg">Save Changes</button>
          <a href="/events/{{ event.id }}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
